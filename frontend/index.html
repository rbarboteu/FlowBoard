<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowBoard — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #06080F;
      --surface:   #0D1117;
      --glass:     rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.07);
      --accent:    #6366F1;
      --accent2:   #8B5CF6;
      --glow:      rgba(99,102,241,0.35);
      --text:      #F0F2FF;
      --muted:     #6B7280;
      --danger:    #EF4444;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Animated background ── */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: drift 20s ease-in-out infinite;
    }
    .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -8s; }
    .orb-3 { width: 300px; height: 300px; background: #06B6D4; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -4s; opacity: 0.08; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, -30px) scale(1.05); }
      66%       { transform: translate(-20px, 20px) scale(0.97); }
    }

    /* ── Grid dots ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.5), 0 0 80px var(--glow);
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 20px var(--glow);
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 40%, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 13.5px;
      font-weight: 400;
      margin-bottom: 36px;
      letter-spacing: 0.01em;
    }

    /* ── Fields ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      outline: none;
      transition: all 0.2s;
    }
    .field input::placeholder { color: #374151; }
    .field input:focus {
      border-color: var(--accent);
      background: rgba(99,102,241,0.08);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px var(--glow);
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 32px var(--glow); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Error ── */
    .erro {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px;
      color: #FCA5A5;
      font-size: 13px;
      display: none;
      animation: fadeUp 0.3s ease;
    }

    /* ── Register link ── */
    .register-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }
    .register-link a {
      color: #a5b4fc;
      text-decoration: none;
      font-weight: 500;
    }
    .register-link a:hover { color: white; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="card-wrap">
    <div class="card">
      <div class="logo-wrap">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">FlowBoard</div>
      </div>
      <p class="tagline">Gestão de tarefas para times modernos</p>

      <div class="field">
        <label>Código da Empresa</label>
        <input type="text" id="slug" placeholder="ex: empresa-teste" value="empresa-teste" />
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="seu@email.com" value="admin@teste.com" />
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" value="Admin@123" />
      </div>

      <button class="btn-login" id="btnLogin" onclick="login()">Entrar na plataforma</button>

      <div class="erro" id="erro"></div>

      <div class="register-link">
        Empresa nova? <a href="register.html">Criar conta grátis →</a>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5291';

    async function login() {
      const btn   = document.getElementById('btnLogin');
      const erro  = document.getElementById('erro');
      const slug  = document.getElementById('slug').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      btn.disabled = true;
      btn.textContent = 'Autenticando...';
      erro.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, email, password: senha })
        });
        const data = await res.json();
        if (!res.ok) {
          erro.textContent = data.error || 'Credenciais inválidas.';
          erro.style.display = 'block';
          return;
        }
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('email', data.email);
        sessionStorage.setItem('role', data.role);
        window.location.href = 'dashboard.html';
      } catch {
        erro.textContent = 'Não foi possível conectar à API.';
        erro.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar na plataforma';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
