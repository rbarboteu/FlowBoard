<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowBoard — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #06080F;
      --surface:   #0D1117;
      --card:      #0F1521;
      --glass:     rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.04);
      --accent:    #6366F1;
      --accent2:   #8B5CF6;
      --glow:      rgba(99,102,241,0.2);
      --text:      #F0F2FF;
      --muted:     #6B7280;
      --muted2:    #374151;
      --todo:      #64748B;
      --progress:  #F59E0B;
      --done:      #10B981;
      --danger:    #EF4444;
      --sidebar-w: 280px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════ LAYOUT ═══════════════════════════════ */
    .layout { display: flex; height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border2);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 16px var(--glow);
      flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 40%, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted2);
      margin-bottom: 8px;
    }

    .sidebar-body { flex: 1; overflow-y: auto; padding: 16px 12px; }
    .sidebar-body::-webkit-scrollbar { width: 0; }

    /* Project list */
    .projeto-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 2px;
      border: 1px solid transparent;
      group: true;
    }
    .projeto-item:hover { background: var(--glass); border-color: var(--border2); }
    .projeto-item.ativo {
      background: rgba(99,102,241,0.12);
      border-color: rgba(99,102,241,0.25);
    }
    .projeto-item-left { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .projeto-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted2);
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .projeto-item.ativo .projeto-dot { background: var(--accent); box-shadow: 0 0 8px var(--glow); }
    .projeto-item-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .projeto-item.ativo .projeto-item-name,
    .projeto-item:hover .projeto-item-name { color: var(--text); }
    .projeto-item-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .projeto-item:hover .projeto-item-actions { opacity: 1; }
    .btn-icon-sm {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 5px;
      font-size: 12px;
      transition: all 0.15s;
    }
    .btn-icon-sm:hover { background: var(--border); color: var(--text); }
    .btn-icon-sm.del:hover { background: rgba(239,68,68,0.15); color: var(--danger); }

    .btn-new-project {
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-new-project:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,0.05); }

    /* new project form */
    .form-new-project {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-top: 8px;
      display: none;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .form-new-project input,
    .form-new-project textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      transition: all 0.15s;
    }
    .form-new-project input:focus,
    .form-new-project textarea:focus { border-color: var(--accent); background: rgba(99,102,241,0.07); }
    .form-new-project textarea { resize: none; height: 64px; }
    .btn-create {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-create:hover { opacity: 0.9; }

    /* sidebar footer */
    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border2);
    }
    .user-block {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--glass);
      border: 1px solid var(--border2);
    }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-email {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-role {
      font-size: 11px;
      color: var(--muted);
    }
    .btn-sair {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 15px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-sair:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .topbar-actions { display: flex; gap: 10px; }

    .btn-primary {
      padding: 9px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 16px var(--glow);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--glow); }
    .btn-secondary {
      padding: 9px 18px;
      background: var(--glass);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

    /* ── Board area ── */
    .board-area {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 24px 28px;
    }

    /* Empty state */
    .empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted2);
    }
    .empty-state-icon { font-size: 48px; opacity: 0.4; }
    .empty-state-text { font-size: 15px; }

    /* New task form */
    .form-new-task {
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      display: none;
      animation: fadeUp 0.2s ease;
    }
    .form-new-task input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      outline: none;
      margin-bottom: 10px;
      transition: all 0.15s;
    }
    .form-new-task input:focus { border-color: var(--accent); background: rgba(99,102,241,0.08); }
    .form-new-task-actions { display: flex; gap: 8px; }
    .form-new-task-actions button { flex: 1; padding: 9px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }

    /* Kanban */
    .kanban {
      display: flex;
      gap: 16px;
      height: 100%;
      min-width: 700px;
    }

    .kanban-col {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .kanban-col-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .kanban-col-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col-dot-todo { background: var(--todo); }
    .col-dot-progress { background: var(--progress); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
    .col-dot-done { background: var(--done); box-shadow: 0 0 8px rgba(16,185,129,0.5); }

    .col-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .kanban-col-body { flex: 1; overflow-y: auto; }
    .kanban-col-body::-webkit-scrollbar { width: 3px; }
    .kanban-col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Task card */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      transition: all 0.15s;
      animation: fadeUp 0.25s ease;
    }
    .task-card:hover { border-color: var(--border); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

    .task-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .task-title { font-size: 13.5px; font-weight: 500; line-height: 1.4; }
    .btn-del-task {
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      font-size: 12px;
      transition: all 0.15s;
      flex-shrink: 0;
      opacity: 0;
    }
    .task-card:hover .btn-del-task { opacity: 1; }
    .btn-del-task:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    .task-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-move {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-move:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,0.08); }

    .col-vazio { color: var(--muted2); font-size: 13px; text-align: center; padding: 32px 0; }

    /* ═══════════════════════════════ MODAL ═══════════════════════════════ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.aberto { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: fadeUp 0.25s cubic-bezier(.16,1,.3,1);
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .btn-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; transition: all 0.15s; }
    .btn-close:hover { color: var(--text); background: var(--border); }

    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .modal-field input,
    .modal-field select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.15s;
    }
    .modal-field input:focus,
    .modal-field select:focus { border-color: var(--accent); background: rgba(99,102,241,0.08); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .modal-field select option { background: #1a1f2e; }

    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 4px 16px var(--glow); }
    .btn-confirm:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-cancel { background: var(--glass); color: var(--muted); border: 1px solid var(--border) !important; }
    .btn-cancel:hover { color: var(--text); }

    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6EE7B7; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #FCA5A5; }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">FlowBoard</div>
      </div>
      <div class="section-label">Projetos</div>
    </div>

    <div class="sidebar-body">
      <div id="listaProjetos"></div>

      <div id="formProjeto" class="form-new-project">
        <input type="text" id="nomeProj" placeholder="Nome do projeto" />
        <textarea id="descProj" placeholder="Descrição (opcional)"></textarea>
        <button class="btn-create" onclick="criarProjeto()">Criar projeto</button>
      </div>

      <button class="btn-new-project" onclick="toggleFormProjeto()">
        <span>+</span> Novo projeto
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="user-block">
        <div class="user-avatar" id="userAvatar"></div>
        <div class="user-info">
          <div class="user-email" id="userEmail"></div>
          <div class="user-role" id="userRole"></div>
        </div>
        <button class="btn-sair" onclick="sair()" title="Sair">↪</button>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Selecione um projeto</div>
      <div class="topbar-actions" id="topbarActions" style="display:none">
        <button class="btn-secondary" id="btnAddUser" onclick="abrirModalUsuario()" style="display:none">+ Usuário</button>
        <button class="btn-primary" onclick="toggleFormTarefa()">+ Nova tarefa</button>
      </div>
    </div>

    <div class="board-area" id="boardArea">
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div class="empty-state-text">Selecione um projeto na barra lateral</div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Editar Projeto -->
<div class="modal-overlay" id="modalEditarProjeto">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Editar Projeto</div>
      <button class="btn-close" onclick="fecharModal('modalEditarProjeto')">✕</button>
    </div>
    <div class="modal-field">
      <label>Nome</label>
      <input type="text" id="editNomeProj" placeholder="Nome do projeto" />
    </div>
    <div class="modal-field">
      <label>Descrição</label>
      <input type="text" id="editDescProj" placeholder="Descrição" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharModal('modalEditarProjeto')">Cancelar</button>
      <button class="btn-confirm" onclick="salvarEdicaoProjeto()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Novo Usuário -->
<div class="modal-overlay" id="modalUsuario">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Novo Usuário</div>
      <button class="btn-close" onclick="fecharModal('modalUsuario')">✕</button>
    </div>
    <div class="alert alert-success" id="sucessoUsuario">✓ Usuário criado com sucesso!</div>
    <div class="alert alert-error" id="erroUsuario"></div>
    <div class="modal-field">
      <label>Email</label>
      <input type="email" id="novoEmail" placeholder="usuario@empresa.com" />
    </div>
    <div class="modal-field">
      <label>Senha</label>
      <input type="password" id="novaSenha" placeholder="••••••••" />
    </div>
    <div class="modal-field">
      <label>Perfil</label>
      <select id="novoRole">
        <option value="Member">Member — acesso padrão</option>
        <option value="Admin">Admin — acesso total</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharModal('modalUsuario')">Fechar</button>
      <button class="btn-confirm" onclick="criarUsuario()">Criar usuário</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
